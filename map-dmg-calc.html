<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PD2 Map Damage Calculator</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23000'/%3E%3Cpath d='M16 3l3.5 10.8h11.3l-9.2 6.7 3.5 10.8L16 24.6 6.9 31.3l3.5-10.8-9.2-6.7h11.3z' fill='%23c7a968' opacity='0.9'/%3E%3C/svg%3E">
<style>
  @font-face {
    font-family: 'Exocet';
    src: url('data/font/exocetblizzardot-medium.otf') format('opentype');
  }
  :root {
    --bg: #000; --bg2: #0a0a0a; --bg3: #151515; --panel: #111;
    --border: #2a2017; --border-light: #3d3225;
    --gold: #c7a968; --gold-bright: #e2c882; --gold-dim: #8c7440;
    --tan: #b09872; --text: #a89070; --text-dim: #6b5d4d;
    --phys: #a08060; --magic: #7060a0; --fire: #c04020;
    --light: #c0b040; --cold: #4080b0; --poison: #40a040;
    --immune: #ff3030;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  /* Scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border-light); border: 2px solid var(--bg); }
  ::-webkit-scrollbar-thumb:hover { background: var(--gold-dim); }
  ::-webkit-scrollbar-corner { background: var(--bg); }
  /* Checkbox */
  input[type="checkbox"] {
    appearance: none; -webkit-appearance: none; width: 14px; height: 14px;
    background: var(--bg3); border: 1px solid var(--border-light); cursor: pointer;
    vertical-align: middle; position: relative; flex-shrink: 0;
  }
  input[type="checkbox"]:checked {
    background: var(--gold-dim); border-color: var(--gold);
  }
  input[type="checkbox"]:checked::after {
    content: ''; position: absolute; left: 3px; top: 0px; width: 5px; height: 9px;
    border: solid var(--bg); border-width: 0 2px 2px 0; transform: rotate(45deg);
  }
  input[type="checkbox"]:hover { border-color: var(--gold-dim); }
  body {
    font-family: 'Times New Roman', Times, Georgia, serif;
    background: var(--bg); color: var(--text); display: flex; height: 100vh;
  }

  /* Sidebar */
  .sidebar {
    width: 310px; min-width: 310px; background: var(--bg2);
    border-right: 1px solid var(--border); overflow-y: auto;
    padding: 12px; font-size: 0.85rem;
  }
  .sidebar h2 {
    font-family: 'Exocet', Georgia, serif; color: var(--gold);
    font-size: 1rem; font-weight: normal; margin: 12px 0 6px;
    border-bottom: 1px solid var(--border); padding-bottom: 4px;
  }
  .sidebar h2:first-child { margin-top: 0; }
  .sidebar h3 {
    color: var(--gold-dim); font-size: 0.8rem; margin: 8px 0 4px;
    font-weight: normal;
  }
  .sidebar table { width: 100%; border-collapse: collapse; }
  .sidebar th {
    text-align: left; font-size: 0.7rem; color: var(--text-dim);
    font-weight: normal; padding: 2px;
  }
  .sidebar td { padding: 2px; }
  .sidebar input[type="text"], .sidebar input[type="number"], .sidebar select {
    width: 100%; background: var(--bg3); color: var(--tan);
    border: 1px solid var(--border); padding: 3px 5px; font-size: 0.8rem;
    font-family: inherit;
  }
  .sidebar input[type="text"]:focus, .sidebar select:focus {
    outline: none; border-color: var(--gold-dim);
  }
  .sidebar input[type="checkbox"] { margin-right: 4px; }
  .sidebar label { cursor: pointer; color: var(--tan); font-size: 0.8rem; }
  .sidebar input.disabled-input {
    opacity: 0.3; pointer-events: none;
  }

  .map-list { list-style: none; padding-left: 4px; }
  .map-list li { padding: 1px 0; }
  .map-list label { display: flex; align-items: center; gap: 4px; }

  .desc { color: var(--text-dim); font-size: 0.75rem; margin: 4px 0 8px; font-style: italic; }
  .mod-row { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
  .mod-row input[type="text"] { width: 50px; }
  .mod-row select { width: auto; }

  .back-link {
    display: inline-block; color: var(--gold-dim); font-size: 0.8rem;
    text-decoration: none; margin-bottom: 8px;
  }
  .back-link:hover { color: var(--gold); }

  /* Damage source cards */
  .dmg-source {
    background: var(--bg3); border: 1px solid var(--border); padding: 8px;
    margin-bottom: 6px; position: relative;
  }
  .dmg-source table { margin-top: 4px; }
  .dmg-source-header {
    display: flex; justify-content: space-between; align-items: center;
  }
  .dmg-source-header span { font-size: 0.8rem; color: var(--gold-dim); }
  .remove-btn {
    background: none; border: 1px solid var(--border); color: var(--text-dim);
    cursor: pointer; font-size: 0.75rem; padding: 1px 6px; font-family: inherit;
  }
  .remove-btn:hover { color: var(--immune); border-color: var(--immune); }
  .add-btn {
    background: var(--bg3); border: 1px solid var(--border); color: var(--gold-dim);
    cursor: pointer; padding: 6px 16px; font-family: inherit; font-size: 0.85rem;
    width: 100%; margin-top: 4px;
  }
  .add-btn:hover { color: var(--gold); border-color: var(--gold-dim); }

  /* Breaking pierce table */
  .break-table td:first-child { min-width: 60px; }
  .break-table input { width: 50px; }
  .c-phys { color: var(--phys); }
  .c-magic { color: var(--magic); }
  .c-fire { color: var(--fire); }
  .c-light { color: var(--light); }
  .c-cold { color: var(--cold); }
  .c-poison { color: var(--poison); }

  /* Main content */
  .main {
    flex: 1; overflow-y: auto; padding: 16px;
  }
  .map-section { margin-bottom: 24px; }
  .map-section h1 {
    font-family: 'Exocet', Georgia, serif; color: var(--gold-bright);
    font-size: 1.1rem; font-weight: normal; margin-bottom: 8px;
  }
  .map-section h1 span { color: var(--text-dim); font-size: 0.85rem; margin-left: 8px; }
  .calc-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
  .calc-table th {
    text-align: left; font-size: 0.75rem; color: var(--gold-dim);
    font-weight: normal; text-transform: uppercase; padding: 4px 6px;
    border-bottom: 1px solid var(--border);
  }
  .calc-table td {
    padding: 6px; border-bottom: 1px solid #0e0e0e; vertical-align: top;
  }
  .calc-table tr:hover td { background: #0a0a0a; }
  .mon-name { color: var(--gold); }
  .mon-type { color: var(--text-dim); font-size: 0.7rem; }

  .res-cell { font-size: 0.75rem; line-height: 1.4; }
  .res-cell .res-row { display: flex; align-items: center; gap: 2px; }
  .res-cell .arrow { color: var(--text-dim); font-size: 0.65rem; }
  .res-cell .immune { font-weight: bold; }
  .res-cell .dps-val { font-size: 0.8rem; }
  .res-cell.inactive { opacity: 0.15; }

  .sum-cell { vertical-align: middle; }
  .sum-dmg { font-size: 0.85rem; color: var(--gold); }

  .hp-bar-wrap { width: 120px; }
  .hp-bar { height: 14px; background: var(--bg3); position: relative; border: 1px solid var(--border); }
  .hp-bar-fill { height: 100%; background: var(--fire); transition: width 0.2s; }
  .hp-bar-text {
    position: absolute; top: 0; left: 0; right: 0; text-align: center;
    font-size: 0.65rem; line-height: 14px; color: var(--tan);
  }
  .hp-bar-dead .hp-bar-fill { background: var(--bg3); }
  .hp-label { font-size: 0.7rem; color: var(--text-dim); margin-top: 2px; }
  .ttk-label { font-size: 0.7rem; color: var(--gold-dim); }

  .no-maps { color: var(--text-dim); font-style: italic; padding: 20px; }

  @media (max-width: 768px) {
    body { flex-direction: column; height: auto; }
    .sidebar { width: 100%; min-width: auto; max-height: 50vh; }
    .main { overflow: visible; }
  }
</style>
</head>
<body>

<div class="sidebar">
  <a href="index.html" class="back-link">&larr; Maps Explorer</a>
  <a href="https://github.com/Maaaaaarrk/pd2_maps_explorer/issues" target="_blank" class="back-link" style="float:right">Report Issue</a>

  <h2>Breaking Pierce</h2>
  <p class="desc">Immunity-breaking effects (Conviction, Lower Resist)</p>
  <table class="break-table">
    <tbody id="breakInputs"></tbody>
  </table>

  <h2>Damage Sources</h2>
  <p class="desc">Each source = one attack/skill. DPS = dmg per 1 second (25 frames).</p>
  <div id="dmgSources"></div>
  <button class="add-btn" id="addSource">+ Add Damage Source</button>

  <h2>Player Count</h2>
  <div class="mod-row">
    <label for="playerCount">Players</label>
    <select id="playerCount">
      <option value="1">1 (0%)</option>
      <option value="2">2 (+70%)</option>
      <option value="3">3 (+140%)</option>
      <option value="4">4 (+210%)</option>
      <option value="5">5 (+280%)</option>
      <option value="6">6 (+350%)</option>
      <option value="7">7 (+420%)</option>
      <option value="8">8 (+490%)</option>
    </select>
  </div>

  <h2>Map Mods</h2>
  <div class="mod-row">
    <label><input type="checkbox" id="fortification"> Fortification (2x HP)</label>
  </div>
  <div class="mod-row">
    <label>+Max HP %</label>
    <input type="text" id="incMaxHp" value="0" inputmode="numeric">
  </div>

  <h2>Maps</h2>
  <div id="mapCheckboxes"></div>
</div>

<div class="main" id="results">
  <div class="no-maps">Select maps from the sidebar to begin.</div>
</div>

<script src="data/levels.js"></script>
<script src="data/monstats.js"></script>
<script src="data/tiers.js"></script>
<script src="data/monlvl.js"></script>
<script>
const FRAMES_PER_SEC = 25;
const ELEM_TYPES = [
  { key: "phys", label: "Physical", resKey: "resDm_H", cls: "c-phys" },
  { key: "magic", label: "Magic", resKey: "resMa_H", cls: "c-magic" },
  { key: "fire", label: "Fire", resKey: "resFi_H", cls: "c-fire" },
  { key: "light", label: "Lightning", resKey: "resLi_H", cls: "c-light" },
  { key: "cold", label: "Cold", resKey: "resCo_H", cls: "c-cold" },
  { key: "poison", label: "Poison", resKey: "resPo_H", cls: "c-poison" },
];
const ELEM_MAP = {};
ELEM_TYPES.forEach(e => ELEM_MAP[e.key] = e);

const state = {
  breaking: {},   // per-element breaking pierce
  sources: [],    // [{type, dmg, pierce, fpa, cbChance, ranged}]
  playerCount: 1, fortification: false, incMaxHp: 0,
  selectedMaps: [],
};
ELEM_TYPES.forEach(e => state.breaking[e.key] = 0);

let sourceIdCounter = 0;

// Map/monster data
const CAMPAIGN_MAX_ID = 136;
const DISABLED_LEVELS = new Set([152, 153, 157, 159, 165, 166, 172, 182, 184, 187, 194, 196]);

function realHP(baseHP, areaLevel) {
  const entry = monLvlData[String(areaLevel)];
  if (!entry) return baseHP;
  return Math.floor(baseHP * entry.lhp_H / 100);
}

function buildMapData() {
  const maps = [];
  tierData.filter(t => !t.auto).forEach(t => {
    t.maps.forEach(m => {
      const level = levelsData.find(l => l.id === m.id);
      if (!level) return;
      const areaLvl = level.monLvlEx_H || level.monLvl_H;
      const monIds = [...new Set(level.monsters_hell)];
      const monsters = monIds.map(id => monstersData[id]).filter(Boolean).map(mon => ({
        name: mon.nameStr || mon.id, id: mon.id,
        type: mon.demon ? "Demon" : (mon.lUndead || mon.hUndead) ? "Undead" : "Animal",
        resDm_H: mon.resDm_H, resMa_H: mon.resMa_H, resFi_H: mon.resFi_H,
        resLi_H: mon.resLi_H, resCo_H: mon.resCo_H, resPo_H: mon.resPo_H,
        minHP: realHP(mon.minHP_H, areaLvl), maxHP: realHP(mon.maxHP_H, areaLvl),
      }));
      maps.push({ id: m.id, name: m.name, tier: t.tier, monsters });
    });
  });
  return maps;
}
const allMaps = buildMapData();

// Damage math
function calcRes(res, pierceNon, pierceBreak) {
  let r = res;
  if (res > 99) { r -= Math.floor(pierceBreak / 2); }
  else { r -= pierceBreak; }
  if (r > 99) return r;
  r -= pierceNon;
  r = r < 0 ? Math.ceil(r / 2) : r;
  return Math.max(r, -100);
}

function calcDmgHit(dmg, res, pierceNon, pierceBreak) {
  const r = calcRes(res, pierceNon, pierceBreak);
  if (r > 99) return 0;
  return r < 0 ? dmg * (1 + Math.abs(r) / 100) : dmg * (1 - r / 100);
}

// Crushing Blow damage per hit for a source against a monster
function cbDmgPerHit(src, monMaxHp) {
  if (!src.cbChance || src.cbChance <= 0) return 0;
  const cbDivisor = 7 + (state.playerCount - 1) * 1.4;
  const rangedMult = src.ranged ? 1.5 : 1;
  const baseCbDmg = monMaxHp / (cbDivisor * rangedMult);
  return baseCbDmg * (Math.min(src.cbChance, 100) / 100);
}

// DPS for a single source against a monster
function sourceDps(src, monster) {
  const elem = ELEM_MAP[src.type];
  if (!elem) return 0;
  const res = monster[elem.resKey];
  const dmgPerHit = calcDmgHit(src.dmg, res, src.pierce, state.breaking[src.type]);
  if (src.type === "poison") {
    // Poison: damage per second is just the listed dmg after res (it's total/duration, applied per hit)
    return dmgPerHit;
  }
  const hitsPerSec = src.fpa > 0 ? FRAMES_PER_SEC / src.fpa : 0;
  return dmgPerHit * hitsPerSec;
}

// Crushing blow DPS for a source (physical damage, uses phys res)
function sourceCbDps(src, monster) {
  if (!src.cbChance || src.fpa <= 0) return 0;
  const maxHp = monsterMaxHp(monster);
  const rawCb = cbDmgPerHit(src, maxHp);
  // CB deals physical damage, apply physical resistance
  const physRes = monster[ELEM_MAP["phys"].resKey];
  const cbAfterRes = calcDmgHit(rawCb, physRes, 0, state.breaking["phys"]);
  const hitsPerSec = FRAMES_PER_SEC / src.fpa;
  return cbAfterRes * hitsPerSec;
}

// Total DPS across all sources
function totalDps(monster) {
  return state.sources.reduce((sum, src) => sum + sourceDps(src, monster) + sourceCbDps(src, monster), 0);
}

// Per-element total DPS (summing all sources of that element)
function elemDps(elemKey, monster) {
  let dps = state.sources
    .filter(s => s.type === elemKey)
    .reduce((sum, src) => sum + sourceDps(src, monster), 0);
  // CB damage is always physical, add it to phys column
  if (elemKey === "phys") {
    dps += state.sources.reduce((sum, src) => sum + sourceCbDps(src, monster), 0);
  }
  return dps;
}

function monsterMaxHp(mon) {
  const playerBonus = 1 + (state.playerCount - 1) * 0.7;
  const fort = state.fortification ? 2 : 1;
  return mon.maxHP * playerBonus * fort * (1 + state.incMaxHp / 100);
}

function hasSources() {
  return state.sources.some(s => s.dmg > 0);
}

function hasElemSources(elemKey) {
  if (elemKey === "phys" && state.sources.some(s => s.cbChance > 0)) return true;
  return state.sources.some(s => s.type === elemKey && s.dmg > 0);
}

// ---- UI: Breaking Pierce ----
function buildBreakInputs() {
  const tbody = document.getElementById("breakInputs");
  ELEM_TYPES.forEach(e => {
    const tr = document.createElement("tr");
    tr.innerHTML = `<td class="${e.cls}">${e.label}</td>
      <td><input type="text" data-break="${e.key}" value="0" inputmode="numeric" style="width:50px"></td>`;
    tbody.appendChild(tr);
  });
  tbody.addEventListener("input", ev => {
    const key = ev.target.dataset.break;
    if (key) { state.breaking[key] = parseInt(ev.target.value) || 0; render(); updateHash(); }
  });
}

// ---- UI: Damage Sources ----
function addSource(type, dmg, pierce, fpa, cbChance, ranged) {
  const src = { id: sourceIdCounter++, type: type || "phys", dmg: dmg || 0, pierce: pierce || 0, fpa: fpa || 10, cbChance: cbChance || 0, ranged: ranged || false };
  state.sources.push(src);
  renderSourceCard(src);
  render(); updateHash();
}

function removeSource(id) {
  state.sources = state.sources.filter(s => s.id !== id);
  const el = document.getElementById("src-" + id);
  if (el) el.remove();
  render(); updateHash();
}

function renderSourceCard(src) {
  const container = document.getElementById("dmgSources");
  const div = document.createElement("div");
  div.className = "dmg-source";
  div.id = "src-" + src.id;

  const isPoison = src.type === "poison";
  div.innerHTML = `
    <div class="dmg-source-header">
      <span>#${state.sources.indexOf(src) + 1}</span>
      <button class="remove-btn" data-remove="${src.id}">&times;</button>
    </div>
    <table><tbody>
      <tr>
        <th>Type</th>
        <td><select data-src="${src.id}" data-field="type">
          ${ELEM_TYPES.map(e => `<option value="${e.key}" ${e.key === src.type ? 'selected' : ''}>${e.label}</option>`).join("")}
        </select></td>
      </tr>
      <tr><th>Damage</th><td><input type="text" data-src="${src.id}" data-field="dmg" value="${src.dmg}" inputmode="numeric"></td></tr>
      <tr><th>Pierce %</th><td><input type="text" data-src="${src.id}" data-field="pierce" value="${src.pierce}" inputmode="numeric"></td></tr>
      <tr><th>FPA</th><td><input type="text" data-src="${src.id}" data-field="fpa" value="${src.fpa}" inputmode="numeric" class="${isPoison ? 'disabled-input' : ''}"></td></tr>
      <tr><th>CB %</th><td><input type="text" data-src="${src.id}" data-field="cbChance" value="${src.cbChance}" inputmode="numeric" title="Crushing Blow chance %"></td></tr>
      <tr><th>Ranged</th><td><label><input type="checkbox" data-src="${src.id}" data-field="ranged" ${src.ranged ? 'checked' : ''}> Ranged attack</label></td></tr>
    </tbody></table>
  `;
  container.appendChild(div);

  // Events
  div.querySelector(`[data-remove="${src.id}"]`).addEventListener("click", () => removeSource(src.id));

  div.querySelectorAll("[data-src]").forEach(inp => {
    const handler = () => {
      const field = inp.dataset.field;
      const s = state.sources.find(x => x.id === parseInt(inp.dataset.src));
      if (!s) return;
      if (field === "type") {
        s.type = inp.value;
        // Toggle FPA disabled for poison
        const fpaInput = div.querySelector('[data-field="fpa"]');
        if (inp.value === "poison") { fpaInput.classList.add("disabled-input"); }
        else { fpaInput.classList.remove("disabled-input"); }
      } else if (field === "ranged") {
        s.ranged = inp.checked;
      } else {
        s[field] = parseInt(inp.value) || 0;
      }
      render(); updateHash();
    };
    if (inp.type === "checkbox") {
      inp.addEventListener("change", handler);
    } else {
      inp.addEventListener(inp.tagName === "SELECT" ? "change" : "input", handler);
    }
  });
}

function rebuildAllSourceCards() {
  document.getElementById("dmgSources").innerHTML = "";
  state.sources.forEach(src => renderSourceCard(src));
}

document.getElementById("addSource").addEventListener("click", () => addSource());

// ---- UI: Map checkboxes ----
function buildMapCheckboxes() {
  const container = document.getElementById("mapCheckboxes");
  const grouped = {};
  allMaps.forEach(m => { if (!grouped[m.tier]) grouped[m.tier] = []; grouped[m.tier].push(m); });
  for (const [tier, maps] of Object.entries(grouped)) {
    const h3 = document.createElement("h3"); h3.textContent = tier; container.appendChild(h3);
    const ul = document.createElement("ul"); ul.className = "map-list";
    maps.forEach(m => {
      const li = document.createElement("li");
      li.innerHTML = `<label><input type="checkbox" value="${m.id}"> ${m.name}</label>`;
      ul.appendChild(li);
    });
    container.appendChild(ul);
  }
  container.addEventListener("change", ev => {
    if (ev.target.type !== "checkbox") return;
    const id = parseInt(ev.target.value);
    if (ev.target.checked) { if (!state.selectedMaps.includes(id)) state.selectedMaps.push(id); }
    else { state.selectedMaps = state.selectedMaps.filter(x => x !== id); }
    render(); updateHash();
  });
}

// ---- UI: Mod inputs ----
document.getElementById("playerCount").addEventListener("change", ev => {
  state.playerCount = parseInt(ev.target.value) || 1; render(); updateHash();
});
document.getElementById("fortification").addEventListener("change", ev => {
  state.fortification = ev.target.checked; render(); updateHash();
});
document.getElementById("incMaxHp").addEventListener("input", ev => {
  state.incMaxHp = parseInt(ev.target.value) || 0; render(); updateHash();
});

// ---- Render results ----
function render() {
  const main = document.getElementById("results");
  const selected = allMaps.filter(m => state.selectedMaps.includes(m.id));
  if (selected.length === 0) {
    main.innerHTML = '<div class="no-maps">Select maps from the sidebar to begin.</div>';
    return;
  }
  let html = "";
  selected.forEach(map => {
    html += `<div class="map-section" id="map-${map.id}">
      <h1>${map.name}<span>${map.tier}</span></h1>
      <table class="calc-table">
        <thead><tr>
          <th>Monster</th>
          <th>Phys</th><th>Magic</th><th>Fire</th><th>Light</th><th>Cold</th><th>Poison</th>
          <th>DPS</th><th>HP / TTK</th>
        </tr></thead><tbody>`;

    map.monsters.forEach(mon => {
      html += `<tr><td><span class="mon-name">${mon.name}</span><br><span class="mon-type">${mon.type}</span></td>`;

      ELEM_TYPES.forEach(e => {
        const res = mon[e.resKey];
        const totalBreak = state.breaking[e.key];
        // Aggregate non-breaking pierce for this element (max across sources, or sum — using max is more accurate for D2)
        const srcPierces = state.sources.filter(s => s.type === e.key).map(s => s.pierce);
        const maxPierce = srcPierces.length ? Math.max(...srcPierces) : 0;
        const resAfter = calcRes(res, maxPierce, totalBreak);
        const dps = Math.round(elemDps(e.key, mon));
        const active = !hasSources() || hasElemSources(e.key);
        const hasBreakOrPierce = totalBreak > 0 || maxPierce > 0;

        html += `<td class="res-cell ${e.cls} ${active ? '' : 'inactive'}">
          <div class="res-row">
            <span class="${res > 99 ? 'immune' : ''}">${res}</span>
            ${hasBreakOrPierce ? `<span class="arrow"> &rarr; </span><span class="${resAfter > 99 ? 'immune' : ''}">${resAfter}</span>` : ''}
          </div>
          <div class="dps-val">${dps.toLocaleString()}/s</div>
        </td>`;
      });

      const dps = Math.round(totalDps(mon));
      const maxHp = Math.round(monsterMaxHp(mon));
      const ttk = dps > 0 ? (maxHp / dps) : Infinity;
      const ttkDisplay = ttk === Infinity ? "-" : ttk < 1 ? "<1s" : ttk.toFixed(1) + "s";
      const pct = maxHp > 0 ? (dps / maxHp) * 100 : 0;
      const dead = pct >= 100;
      const remaining = Math.max(100 - pct, 0);

      html += `<td class="sum-cell"><span class="sum-dmg">${dps.toLocaleString()}/s</span></td>`;
      html += `<td class="sum-cell"><div class="hp-bar-wrap">
        <div class="hp-bar ${dead ? 'hp-bar-dead' : ''}">
          <div class="hp-bar-fill" style="width:${remaining}%"></div>
          <div class="hp-bar-text">${dead ? '\u2620' : Math.round(remaining) + '%'}</div>
        </div>
        <div class="hp-label">${maxHp.toLocaleString()} HP</div>
        <div class="ttk-label">TTK: ${ttkDisplay}</div>
      </div></td>`;
      html += "</tr>";
    });
    html += "</tbody></table></div>";
  });
  main.innerHTML = html;
}

// ---- Hash persistence ----
function updateHash() {
  const p = {};
  ELEM_TYPES.forEach(e => { if (state.breaking[e.key]) p["b_" + e.key] = state.breaking[e.key]; });
  if (state.sources.length) {
    // Encode sources as: type.dmg.pierce.fpa|type.dmg.pierce.fpa|...
    p.src = state.sources.map(s => `${s.type}.${s.dmg}.${s.pierce}.${s.fpa}.${s.cbChance || 0}.${s.ranged ? 1 : 0}`).join("|");
  }
  if (state.playerCount > 1) p.pc = state.playerCount;
  if (state.fortification) p.fort = 1;
  if (state.incMaxHp) p.imhp = state.incMaxHp;
  if (state.selectedMaps.length) p.maps = state.selectedMaps.join(",");
  const qs = Object.entries(p).map(([k, v]) => k + "=" + encodeURIComponent(v)).join("&");
  history.replaceState(null, "", "#" + qs);
}

function restoreFromHash() {
  const h = location.hash.replace(/^#/, "");
  if (!h) return;
  const params = {};
  h.split("&").forEach(pair => {
    const eq = pair.indexOf("=");
    if (eq > 0) params[pair.slice(0, eq)] = decodeURIComponent(pair.slice(eq + 1));
  });

  ELEM_TYPES.forEach(e => {
    if (params["b_" + e.key]) state.breaking[e.key] = parseInt(params["b_" + e.key]) || 0;
  });

  if (params.src) {
    params.src.split("|").forEach(s => {
      const parts = s.split(".");
      const [type, dmg, pierce, fpa] = parts;
      state.sources.push({
        id: sourceIdCounter++, type,
        dmg: parseInt(dmg) || 0, pierce: parseInt(pierce) || 0, fpa: parseInt(fpa) || 10,
        cbChance: parseInt(parts[4]) || 0, ranged: parts[5] === "1",
      });
    });
  }

  if (params.pc) state.playerCount = parseInt(params.pc) || 1;
  if (params.fort) state.fortification = true;
  if (params.imhp) state.incMaxHp = parseInt(params.imhp) || 0;
  if (params.maps) state.selectedMaps = params.maps.split(",").map(Number);

  // Sync UI
  document.querySelectorAll("#breakInputs input").forEach(inp => {
    if (inp.dataset.break) inp.value = state.breaking[inp.dataset.break];
  });
  document.getElementById("playerCount").value = state.playerCount;
  document.getElementById("fortification").checked = state.fortification;
  document.getElementById("incMaxHp").value = state.incMaxHp;
  document.querySelectorAll("#mapCheckboxes input[type=checkbox]").forEach(cb => {
    cb.checked = state.selectedMaps.includes(parseInt(cb.value));
  });
  rebuildAllSourceCards();
}

// Init
buildBreakInputs();
buildMapCheckboxes();
restoreFromHash();
render();
</script>
